spring:
  application:
    name: menudeldia-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/menudeldia}
    username: ${DB_USER:menudeldia}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

menudeldia:
  google:
    places-api-key: ${GOOGLE_PLACES_API_KEY:}
    places-cache-ttl: PT1H
    places-refresh-batch-size: 5
  auth:
    google-client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    apple-client-id: ${APPLE_BUNDLE_ID:com.menudeldia.app}
    jwt-signing-key: ${JWT_SIGNING_KEY:}
    jwt-ttl: P30D
  photos:
    storage-root: ${PHOTOS_DIR:./var/photos}
  rate-limit:
    read-rpm: 60
    auth-rpm: 10

logging:
  level:
    root: INFO
    com.menudeldia: DEBUG

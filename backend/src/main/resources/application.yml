spring:
  application:
    name: menudeldia-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/menudeldia}
    username: ${DB_USER:menudeldia}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: never

menudeldia:
  google:
    places-api-key: ${GOOGLE_PLACES_API_KEY:}
    places-cache-ttl: PT1H
    places-refresh-batch-size: 5
  auth:
    google-client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
    apple-client-id: ${APPLE_BUNDLE_ID:com.menudeldia.app}
    jwt-signing-key: ${JWT_SIGNING_KEY:}
    jwt-ttl: P30D
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  rate-limit:
    read-rpm: 60
    auth-rpm: 10
  admin-token: ${ADMIN_TOKEN:}
  csv:
    path: ${CSV_PATH:./restaurants_db_ready.csv}

resilience4j:
  circuitbreaker:
    instances:
      googlePlaces:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: false

logging:
  level:
    root: INFO
    com.menudeldia: DEBUG
